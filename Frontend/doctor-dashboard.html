<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard - Salama</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  <link href="assets/css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="dash-wrapper" id="dashWrapper">

    <!-- Sidebar -->
    <aside class="dash-sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h4><i class="bi bi-hospital me-2"></i>Salama</h4>
        <small>Doctor Dashboard</small>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active" data-section="dashboard">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="#" data-section="upcoming">
          <i class="bi bi-calendar-check"></i> My Appointments
        </a>
        <a href="#" data-section="patients">
          <i class="bi bi-people"></i> My Patients
        </a>
        <a href="#" data-section="profile">
          <i class="bi bi-person-circle"></i> My Profile
        </a>
        <a href="#" data-section="clinics">
          <i class="bi bi-building"></i> My Clinics
        </a>
        <a href="#" data-section="certificates">
          <i class="bi bi-award"></i> My Certificates
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dash-main">

      <!-- Top Bar -->
      <div class="dash-topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" onclick="if(window.innerWidth<992){document.getElementById('sidebar').classList.toggle('show')}else{document.getElementById('dashWrapper').classList.toggle('sidebar-collapsed')}">
            <i class="bi bi-list"></i>
          </button>
          <h5 id="pageTitle">Dashboard</h5>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode"><i class="bi" id="themeIcon"></i></button>
          <span class="user-badge">
            <i class="bi bi-person-circle"></i>
            <span id="userName">Doctor</span>
          </span>
          <button class="btn-logout" onclick="Api.logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="dash-content" id="contentArea">
        <!-- Filled by doctor.js -->
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/doctor.js"></script>
  <script>
    if (!Api.requireAuth('Doctor')) {}
    document.addEventListener('DOMContentLoaded', () => { initDoctor(); });
  </script>
</body>
</html>
