<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Login - Salama</title>
  <link href="assets/img/favicon.png" rel="icon">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode" style="position:fixed;top:1rem;right:1rem;z-index:9999"><i class="bi" id="themeIcon"></i></button>
    <div class="auth-card" data-aos="fade-up">
      <div class="logo">
        <h2><i class="bi bi-heart-pulse"></i> Salama</h2>
        <p>Welcome back! Please login to your account.</p>
      </div>
      <h3>Login</h3>
      <div id="loginMsg" class="d-none"></div>
      <form id="loginForm" action="#">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
      <div class="auth-footer" style="margin-top:.5rem">
        <a href="index.html" style="color:#6c757d"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/theme.js"></script>
  <script>setupLoginForm();</script>
</body>
</html>
